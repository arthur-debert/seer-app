# Pre-commit hooks — ordered by priority (lower number runs first).
# If a priority group fails, later groups are skipped.
#
#   1 — Auto-fix:  prettier & eslint with --write/--fix, auto-stage results
#   2 — Build:     WASM compilation (prerequisite for type checking)
#   3 — Check:     svelte-check & vitest (parallel, independent)
#   4 — E2E:       Playwright (slow — only runs if everything above passes)
#
# CI runs the same checks via scripts/check-format-all.sh and
# scripts/check-frontend.sh. Keep them in sync when adding checks.

pre-commit:
  commands:
    # --- Phase 1: Auto-fix (format & lint) ---
    prettier:
      glob: '*.{ts,tsx,jsx,svelte,js,json,css,html,md}'
      run: pnpm prettier --write {staged_files}
      stage_fixed: true
      priority: 1

    eslint:
      glob: '*.{ts,tsx,jsx,svelte,js}'
      run: pnpm eslint --no-warn-ignored --fix {staged_files}
      stage_fixed: true
      priority: 1

    # --- Phase 2: Fetch WASM (svelte-check imports from WASM packages) ---
    wasm-fetch:
      run: bash scripts/hook-wrapper.sh wasm-fetch pnpm fetch:wasm
      priority: 2

    # --- Phase 3: Type checking & unit tests (parallel) ---
    svelte-check:
      run: bash scripts/hook-wrapper.sh svelte-check bash -c 'pnpm svelte-kit sync && pnpm svelte-check --tsconfig ./tsconfig.json --threshold warning'
      priority: 3

    vitest:
      run: bash scripts/hook-wrapper.sh vitest pnpm vitest run --passWithNoTests
      priority: 3

    # --- Phase 4: E2E (slow, runs last) ---
    e2e:
      glob: '{src,tests}/**/*.{ts,tsx,svelte,js}'
      run: |
        echo ""
        echo "  Running E2E tests (slow — check results above for faster feedback)"
        echo ""
        bash scripts/hook-wrapper.sh e2e npx playwright test
      priority: 4
